<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
</head>
<body style="margin:0;font-family:sans-serif;">
<div id="debug" style="padding:8px;background:#f1efe8;font-size:13px;border-bottom:1px solid #ccc;">
  Waiting for CRM context…
</div>

<div id="inline-container"></div>

<div style="padding:12px;text-align:center;border-top:1px solid #ccc;">
  <button id="confirmBtn" style="padding:12px 28px;background:#2d9d78;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;" disabled>
    Confirmer la réservation
  </button>
  <p id="btnMsg" style="font-size:12px;color:#888;margin:8px 0 0;">Cliquez ici après avoir réservé le créneau</p>
</div>

<pre id="logs" style="padding:8px;background:#1e1e1e;color:#0f0;font-size:11px;max-height:150px;overflow:auto;margin:0;display:none;"></pre>

<script src="https://bookings.nimbuspop.com/assets/embed.js"></script>
<script>
var CURRENT_LEAD_ID = null;
var CURRENT_EMAIL = null;
var DONE = false;

function log(msg) {
  console.log(msg);
  var el = document.getElementById("logs");
  el.style.display = "block";
  el.textContent += msg + "\n";
  el.scrollTop = el.scrollHeight;
}

ZOHO.embeddedApp.on("PageLoad", function(data) {
  var dbg = document.getElementById("debug");
  var leadId = data && data.EntityId;
  if (Array.isArray(leadId)) leadId = leadId[0];
  if (!leadId) {
    dbg.style.background = "#fceaea";
    dbg.innerHTML = "Erreur : aucun lead ID reçu.";
    return;
  }
  CURRENT_LEAD_ID = leadId;
  log("Lead ID: " + leadId);

  ZOHO.CRM.API.getRecord({ Entity: "Leads", RecordID: leadId })
    .then(function(resp) {
      var lead = resp && resp.data && resp.data[0];
      if (!lead) {
        dbg.style.background = "#fceaea";
        dbg.innerHTML = "Lead introuvable.";
        return;
      }
      var fullName = lead.Full_Name || ((lead.First_Name || "") + " " + (lead.Last_Name || "")).trim();
      var email    = lead.Email || "";
      var phone    = lead.Phone || "";
      CURRENT_EMAIL = email;
      log("Email: " + email);

      var bookingUrl = "https://labeebacademy.zohobookings.com/portal-embed#/4935786000000036177"
        + "?Name="           + encodeURIComponent(fullName)
        + "&Email="          + encodeURIComponent(email)
        + "&Contact Number=" + encodeURIComponent(phone);

      dbg.style.background = "#e1f5ee";
      dbg.innerHTML = "Réservez un créneau pour <b>" + fullName + "</b>, puis confirmez.";

      Bookings.inlineEmbed({
        url: bookingUrl,
        parent: "#inline-container",
        height: "550px"
      });

      document.getElementById("confirmBtn").disabled = false;
    })
    .catch(function(err) {
      dbg.style.background = "#fceaea";
      dbg.innerHTML = "Erreur : " + JSON.stringify(err);
    });
});

document.getElementById("confirmBtn").addEventListener("click", function() {
  if (DONE || !CURRENT_LEAD_ID || !CURRENT_EMAIL) return;

  var dbg = document.getElementById("debug");
  var btn = document.getElementById("confirmBtn");
  btn.disabled = true;
  dbg.style.background = "#fff8e1";
  dbg.innerHTML = "Vérification de la réservation…";
  log("=== Vérification démarrée ===");

  // Calculer les dates
  var now = new Date();
  var from = new Date(now);
  from.setDate(from.getDate() - 30);
  var to = new Date(now);
  to.setDate(to.getDate() + 90);

  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var fromStr = ("0" + from.getDate()).slice(-2) + "-" + months[from.getMonth()] + "-" + from.getFullYear();
  var toStr = ("0" + to.getDate()).slice(-2) + "-" + months[to.getMonth()] + "-" + to.getFullYear();

  var dataParam = JSON.stringify({
    "customer_email": CURRENT_EMAIL,
    "from_time": fromStr,
    "to_time": toStr
  });

  log("Params: " + dataParam);
  log("Appel CONNECTION.invoke...");

  // Vérifier si CONNECTION.invoke existe
  if (!ZOHO.CRM.CONNECTION || !ZOHO.CRM.CONNECTION.invoke) {
    log("ERREUR: ZOHO.CRM.CONNECTION.invoke n'existe pas");
    dbg.style.background = "#fceaea";
    dbg.innerHTML = "Erreur : CONNECTION.invoke non disponible.";
    btn.disabled = false;
    return;
  }

  ZOHO.CRM.CONNECTION.invoke({
    "name": "bookings_connection",
    "method": "POST",
    "url": "https://www.zohoapis.com/bookings/v1/json/fetchappointment",
    "param_type": 1,
    "parameters": { "data": dataParam }
  })
  .then(function(result) {
    log("Résultat brut: " + JSON.stringify(result).substring(0, 500));

    // Extraire la réponse
    var bookingResp = null;
    if (result && result.details) bookingResp = result.details;
    if (result && result.response) bookingResp = result.response;
    if (typeof result === "string") {
      try { bookingResp = JSON.parse(result); } catch(e) {}
    }

    log("bookingResp: " + JSON.stringify(bookingResp).substring(0, 500));

    // Chercher un RDV valide
    var foundBookingId = null;
    try {
      var resp = bookingResp.response || bookingResp;
      var rv = resp.returnvalue || resp;
      var appts = rv.response || rv;

      if (appts === "No Match Found" || !appts || typeof appts === "string") {
        log("Aucun RDV trouvé");
      } else if (Array.isArray(appts)) {
        for (var i = 0; i < appts.length; i++) {
          var a = appts[i];
          if (a.customer_email === CURRENT_EMAIL && (a.status === "upcoming" || a.status === "yet_to_mark")) {
            foundBookingId = a.booking_id;
            log("RDV valide: " + foundBookingId);
            break;
          }
        }
      }
    } catch(e) {
      log("Erreur parsing: " + e.message);
    }

    if (!foundBookingId) {
      log("Pas de RDV → bloqué");
      btn.disabled = false;
      dbg.style.background = "#fceaea";
      dbg.innerHTML = "⚠ Aucune réservation trouvée. Réservez d'abord un créneau.";
      return;
    }

    // RDV trouvé → écrire le Booking_ID
    DONE = true;
    log("Écriture Booking_ID: " + foundBookingId);
    dbg.style.background = "#e1f5ee";
    dbg.innerHTML = "✅ RDV vérifié (" + foundBookingId + "). Enregistrement…";

    return ZOHO.CRM.API.updateRecord({
      Entity: "Leads",
      RecordID: CURRENT_LEAD_ID,
      APIData: { "id": CURRENT_LEAD_ID, "Booking_ID": foundBookingId }
    });
  })
  .then(function(updResp) {
    if (!updResp) return;
    log("Booking_ID enregistré: " + JSON.stringify(updResp));
    dbg.innerHTML = "✅ Réservation confirmée. Rafraîchissement…";
    if (ZOHO.CRM.UI && ZOHO.CRM.UI.Record && ZOHO.CRM.UI.Record.refresh) {
      ZOHO.CRM.UI.Record.refresh();
    }
  })
  .catch(function(err) {
    log("ERREUR: " + JSON.stringify(err));
    DONE = false;
    btn.disabled = false;
    dbg.style.background = "#fceaea";
    dbg.innerHTML = "Erreur : " + JSON.stringify(err);
  });
});

ZOHO.embeddedApp.init();
</script>
</body>
</html>
